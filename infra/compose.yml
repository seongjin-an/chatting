services:
  mysql:
    image: mysql:8.0.33
    container_name: chatting-mysql
    restart: unless-stopped
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --skip-character-set-client-handshake
      --log-bin=mysql-bin --binlog-format=ROW --binlog-row-image=FULL --server-id=1
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_password
    ports:
      - "23306:3306"
    volumes:
      - ./.data/mysql:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

  # ── Kafka (KRaft 모드 — Zookeeper 없음) ──────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: chatting-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      # KRaft 클러스터 ID — base64url 인코딩된 UUID (고정값, 개발 전용)
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - ./.data/kafka:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 10s
      timeout: 10s
      retries: 5
  kafka-connect:
    image: quay.io/debezium/connect:3.1
    container_name: kafka-connect
    restart: unless-stopped
    ports:
      - "28083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: chatting-outbox-connector
      CONFIG_STORAGE_TOPIC: debezium-configs
      OFFSET_STORAGE_TOPIC: debezium-offsets
      STATUS_STORAGE_TOPIC: debezium-status
      KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      VALUE_CONVERTER: org.apache.kafka.connect.storage.StringConverter
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_started

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: chatting-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7
    container_name: chatting-redis
    ports:
      - "6379:6379"
    volumes:
      - ./.data/redis:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redisinsight:
    image: redis/redisinsight:2.64.1
    container_name: chatting-redisinsight
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5540:5540"

  # ── Observability Stack ──────────────────────────────────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: chatting-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yml"]
    volumes:
      - ./observability/otel-collector-config.yml:/etc/otel/config.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC — Spring Boot OTel Agent
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Collector 자체 메트릭
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.6.0
    container_name: chatting-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./observability/tempo-config.yml:/etc/tempo.yml:ro
      - ./.data/tempo:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP (Grafana 데이터소스)

  loki:
    image: grafana/loki:3.2.0
    container_name: chatting-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./observability/loki-config.yml:/etc/loki/config.yml:ro
      - ./.data/loki:/loki
    ports:
      - "3100:3100"

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: chatting-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./.data/prometheus:/prometheus
    ports:
      - "9091:9090"   # Prometheus UI (9090은 kafka-ui 사용 중)
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: chatting-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./.data/grafana:/var/lib/grafana
    ports:
      - "3001:3000"   # Grafana UI (3000은 frontend 사용 중)
    depends_on:
      - prometheus
      - loki
      - tempo