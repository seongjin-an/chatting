services:
  mysql:
    image: mysql:8.0.33
    container_name: chatting-mysql
    restart: unless-stopped
#    command: --log-bin=mysql-bin --binlog-format=ROW --binlog-row-image=FULL --server-id=1
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: chatting
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_password
    ports:
      - "23306:3306"
    volumes:
      - ./.data/mysql:/var/lib/mysql

  # ── Kafka (KRaft 모드 — Zookeeper 없음) ──────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: chatting-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      # KRaft 클러스터 ID — base64url 인코딩된 UUID (고정값, 개발 전용)
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - ./.data/kafka:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 10s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: chatting-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7
    container_name: chatting-redis
    ports:
      - "6379:6379"
    volumes:
      - ./.data/redis:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redisinsight:
    image: redis/redisinsight:2.64.1
    container_name: chatting-redisinsight
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5540:5540"