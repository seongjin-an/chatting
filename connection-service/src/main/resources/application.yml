server:
  port: ${SERVER_PORT:8082}
  id: ${SERVER_ID:1}

spring:
  application:
    name: connection-service

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

websocket:
  connection:
    ttl-seconds: 90      # 하트비트 미수신 시 자동 만료 (하트비트 주기의 3배 권장)
    heartbeat-seconds: 30 # 클라이언트 하트비트 주기

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  metrics:
    tags:
      application: ${spring.application.name}

chatting:
  kafka:
    topics:
      message: message-relay
      read: read-relay
    listeners:
      connection:
        topic: connection-instance
        group: connection-instance-group
        concurrency: 3
        partitions: 3
        replicasFactor: 1
        retentionMs: 120000   # 파드 종료 후 고아 토픽 메시지 2분 내 자동 삭제
